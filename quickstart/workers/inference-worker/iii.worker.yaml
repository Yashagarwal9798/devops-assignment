name: math-worker
runtime:
  language: python
  package_manager: pip
  entry: inference_worker.py
scripts:
  install: "pip3 install -r requirements.txt"
  start: "python3 inference_worker.py"
resources:
  memory: 8192   # MiB — bumped from 2048 default
  cpus: 4        # vCPUs — bumped from 2 default
